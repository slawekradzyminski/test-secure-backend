spring:
  profiles:
    active: docker
  main:
    allow-bean-definition-overriding: true

server:
  # Swagger UI in browsers can include large Cookie/Authorization headers; keep headroom above Tomcat defaults.
  max-http-request-header-size: 64KB
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  file:
    name: logs/application.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.awesome.testing: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.zalando.logbook: INFO

logbook:
  include: "/**"
  exclude: 
    - "/swagger-ui/**"
    - "/v3/api-docs"
    - "/v3/api-docs/**"
    - "/actuator/**"
    - "/favicon.ico"
    - "/api/v1/ollama/generate"
    - "/api/v1/ollama/chat/**"
  format:
    style: json
  write:
    chunk-size: 1000
  filter.enabled: true
  obfuscate:
    headers:
      - authorization
      - x-secret
      - cookie

security:
  rate-limit:
    enabled: ${SECURITY_RATE_LIMIT_ENABLED:false}
    trust-forwarded-headers: ${SECURITY_RATE_LIMIT_TRUST_FORWARDED_HEADERS:false}
    cache:
      maximum-size: ${SECURITY_RATE_LIMIT_CACHE_MAXIMUM_SIZE:10000}
      expire-after-access: ${SECURITY_RATE_LIMIT_CACHE_EXPIRE_AFTER_ACCESS:1h}
    policies:
      signup-ip:
        capacity: ${SECURITY_RATE_LIMIT_SIGNUP_IP_CAPACITY:10}
        window: ${SECURITY_RATE_LIMIT_SIGNUP_IP_WINDOW:1h}
      signin-ip:
        capacity: ${SECURITY_RATE_LIMIT_SIGNIN_IP_CAPACITY:20}
        window: ${SECURITY_RATE_LIMIT_SIGNIN_IP_WINDOW:5m}
      signin-username:
        capacity: ${SECURITY_RATE_LIMIT_SIGNIN_USERNAME_CAPACITY:10}
        window: ${SECURITY_RATE_LIMIT_SIGNIN_USERNAME_WINDOW:15m}
      signin-ip-username:
        capacity: ${SECURITY_RATE_LIMIT_SIGNIN_IP_USERNAME_CAPACITY:5}
        window: ${SECURITY_RATE_LIMIT_SIGNIN_IP_USERNAME_WINDOW:5m}
      password-forgot-ip:
        capacity: ${SECURITY_RATE_LIMIT_PASSWORD_FORGOT_IP_CAPACITY:10}
        window: ${SECURITY_RATE_LIMIT_PASSWORD_FORGOT_IP_WINDOW:15m}
      password-forgot-identifier:
        capacity: ${SECURITY_RATE_LIMIT_PASSWORD_FORGOT_IDENTIFIER_CAPACITY:3}
        window: ${SECURITY_RATE_LIMIT_PASSWORD_FORGOT_IDENTIFIER_WINDOW:30m}
      password-reset-ip:
        capacity: ${SECURITY_RATE_LIMIT_PASSWORD_RESET_IP_CAPACITY:10}
        window: ${SECURITY_RATE_LIMIT_PASSWORD_RESET_IP_WINDOW:15m}
      refresh-ip:
        capacity: ${SECURITY_RATE_LIMIT_REFRESH_IP_CAPACITY:60}
        window: ${SECURITY_RATE_LIMIT_REFRESH_IP_WINDOW:15m}
      email-user:
        capacity: ${SECURITY_RATE_LIMIT_EMAIL_USER_CAPACITY:30}
        window: ${SECURITY_RATE_LIMIT_EMAIL_USER_WINDOW:15m}
      qr-user:
        capacity: ${SECURITY_RATE_LIMIT_QR_USER_CAPACITY:60}
        window: ${SECURITY_RATE_LIMIT_QR_USER_WINDOW:15m}
      ollama-user:
        capacity: ${SECURITY_RATE_LIMIT_OLLAMA_USER_CAPACITY:20}
        window: ${SECURITY_RATE_LIMIT_OLLAMA_USER_WINDOW:5m}
      ollama-ip:
        capacity: ${SECURITY_RATE_LIMIT_OLLAMA_IP_CAPACITY:20}
        window: ${SECURITY_RATE_LIMIT_OLLAMA_IP_WINDOW:5m}

app:
  seed-demo-data:
    enabled: false
  bootstrap-admin:
    enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${APP_BOOTSTRAP_ADMIN_USERNAME:}
    password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
    email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}
    first-name: ${APP_BOOTSTRAP_ADMIN_FIRST_NAME:Admin}
    last-name: ${APP_BOOTSTRAP_ADMIN_LAST_NAME:User}
  bootstrap-products:
    enabled: ${APP_BOOTSTRAP_PRODUCTS_ENABLED:false}
    catalog: ${APP_BOOTSTRAP_PRODUCTS_CATALOG:classpath:bootstrap/products.json}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:8081,http://127.0.0.1:8081,http://host.docker.internal:8081}
  traffic:
    max-body-length: ${APP_TRAFFIC_MAX_BODY_LENGTH:4000}
    max-page-size: ${APP_TRAFFIC_MAX_PAGE_SIZE:100}
    retention: ${APP_TRAFFIC_RETENTION:P1D}
    cleanup-interval: ${APP_TRAFFIC_CLEANUP_INTERVAL:PT24H}
    obfuscate-authorization: ${APP_TRAFFIC_OBFUSCATE_AUTHORIZATION:false}
    obfuscate-emails: ${APP_TRAFFIC_OBFUSCATE_EMAILS:false}
    obfuscate-sensitive-body-fields: ${APP_TRAFFIC_OBFUSCATE_SENSITIVE_BODY_FIELDS:false}
  
UserController:
  signin: Authenticates user and returns its JWT token.
  signup: Creates user and returns its JWT token
  delete: Deletes specific user by username
  search: Returns specific user by username
  me: Returns current user's data
  refresh: Refreshes token for logged in user
  getAll: Get all users
  edit: Edits user details

JmsSender:
  sendEmail: Sending email to Active MQ

ollama:
  base-url: http://localhost:11434

springdoc:
  swagger-ui:
    oauth2-redirect-url: ${SWAGGER_UI_OAUTH2_REDIRECT_URL:http://localhost:8081/swagger-ui/oauth2-redirect.html}
