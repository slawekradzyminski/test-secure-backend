spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/testdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        id:
          new_generator_mappings: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    validate-migration-naming: true
  artemis:
    mode: native
    broker-url: tcp://activemq:61616
    user: admin
    password: admin
    pool:
      enabled: true
      max-connections: 10
    packages:
      trust-all: true
  jackson:
    serialization:
      indent-output: true

activemq:
  destination: email

server:
  port: 4001
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

security:
  jwt:
    token:
      secret-key: ${JWT_SECRET_KEY:local-development-jwt-key-change-me}
      expire-length: 3600000

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO
    org.zalando.logbook: TRACE
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

ollama:
  base-url: http://ollama:11434 

password-reset:
  frontend-base-url: ${PASSWORD_RESET_FRONTEND_BASE_URL:http://localhost:8081/reset}
  token-ttl: 30m
  token-byte-length: 32
  expose-token-in-response: false
  local-outbox-enabled: false
